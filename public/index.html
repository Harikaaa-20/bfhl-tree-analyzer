<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BFHL — Node Hierarchy Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7cffb2;
    --accent2: #ff6b6b;
    --accent3: #6bb5ff;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,255,178,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,255,178,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GLOW ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
  }
  .orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -100px; }
  .orb2 { width: 400px; height: 400px; background: var(--accent3); bottom: -100px; right: -100px; }

  /* ── LAYOUT ── */
  .shell {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── HEADER ── */
  header {
    margin-bottom: 56px;
  }
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(124,255,178,0.3);
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e8f0 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .card-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── TEXTAREA ── */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(124,255,178,0.5); }
  textarea::placeholder { color: var(--muted); }

  /* ── EXAMPLES ── */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .ex-btn {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ex-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SUBMIT BUTTON ── */
  .submit-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
    gap: 12px;
    align-items: center;
  }

  #apiUrl {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  #apiUrl:focus { border-color: rgba(124,255,178,0.4); color: var(--text); }

  button.submit {
    background: var(--accent);
    color: #0a0a0f;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  button.submit:hover { background: #a8ffd0; transform: translateY(-1px); }
  button.submit:active { transform: translateY(0); }
  button.submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── LOADER ── */
  .loader {
    display: none;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
  }
  .loader.active { display: flex; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .error-box {
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 13px;
    display: none;
    margin-bottom: 24px;
  }
  .error-box.active { display: block; animation: fadeIn 0.2s; }

  /* ── RESULTS ── */
  #results { display: none; }
  #results.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── META PILLS ── */
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
  }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .pill span { color: var(--text); font-weight: 700; }

  /* ── SUMMARY CARDS ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  @media (max-width: 520px) { .summary-grid { grid-template-columns: 1fr 1fr; } }
  .sum-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    text-align: center;
  }
  .sum-card .val {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
  }
  .sum-card .lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── SECTION HEADER ── */
  .sec-header {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sec-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── HIERARCHY CARDS ── */
  .hier-grid {
    display: grid;
    gap: 14px;
    margin-bottom: 24px;
  }
  .hier-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .hier-card:hover { border-color: rgba(124,255,178,0.25); }
  .hier-card.cycle { border-color: rgba(255,107,107,0.2); }
  .hier-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .hier-card.cycle .hier-head { background: rgba(255,107,107,0.05); border-color: rgba(255,107,107,0.15); }
  .root-badge {
    background: var(--accent);
    color: #0a0a0f;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .hier-card.cycle .root-badge { background: var(--accent2); }
  .hier-head-info { flex: 1; }
  .hier-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .hier-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .cycle-tag {
    background: rgba(255,107,107,0.15);
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,107,107,0.25);
  }
  .expand-icon {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.2s;
  }
  .hier-card.open .expand-icon { transform: rotate(90deg); }

  .hier-body {
    display: none;
    padding: 20px;
  }
  .hier-card.open .hier-body { display: block; }

  /* ── TREE VISUAL ── */
  .tree-view {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    background: var(--surface2);
    border-radius: 8px;
    padding: 16px 20px;
    white-space: pre;
    overflow-x: auto;
  }
  .tree-node-root { color: var(--accent); font-weight: 700; }
  .tree-node { color: var(--text); }
  .tree-connector { color: var(--border); }

  /* ── TAGS (invalid / duplicate) ── */
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .entry-tag {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 11px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .entry-tag.invalid { border-color: rgba(255,107,107,0.3); color: var(--accent2); background: rgba(255,107,107,0.06); }
  .entry-tag.dup { border-color: rgba(107,181,255,0.3); color: var(--accent3); background: rgba(107,181,255,0.06); }

  /* ── RAW JSON TOGGLE ── */
  .raw-toggle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-bottom: 12px;
  }
  .raw-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .raw-json {
    display: none;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    overflow-x: auto;
    white-space: pre;
    color: var(--muted);
    margin-top: 8px;
  }
  .raw-json.active { display: block; }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="tag">POST /bfhl</div>
    <h1>Node Hierarchy<br/>Explorer</h1>
    <p class="subtitle">SRM Full Stack Challenge &mdash; Round 1</p>
  </header>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="card-label">Input Node Edges</div>
    <textarea id="inputData" placeholder='Enter edges separated by commas or newlines&#10;e.g. A->B, A->C, B->D, X->Y, Y->Z, Z->X'></textarea>
    <div class="examples">
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);align-self:center;">Try:</span>
      <button class="ex-btn" onclick="loadExample(1)">Simple Tree</button>
      <button class="ex-btn" onclick="loadExample(2)">With Cycle</button>
      <button class="ex-btn" onclick="loadExample(3)">Full Example</button>
      <button class="ex-btn" onclick="loadExample(4)">Diamond</button>
    </div>

    <div class="submit-row">
      <input id="apiUrl" type="text" placeholder="API URL (e.g. http://localhost:3000)" value="http://localhost:3000" />
      <div class="loader" id="loader"><div class="spinner"></div>Processing…</div>
      <button class="submit" id="submitBtn" onclick="submitData()">Submit →</button>
    </div>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorBox"></div>

  <!-- RESULTS -->
  <div id="results">

    <!-- META -->
    <div class="meta-row" id="metaRow"></div>

    <!-- SUMMARY -->
    <div class="sec-header">Summary</div>
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- HIERARCHIES -->
    <div class="sec-header">Hierarchies</div>
    <div class="hier-grid" id="hierGrid"></div>

    <!-- INVALID -->
    <div id="invalidSection"></div>

    <!-- DUPLICATES -->
    <div id="dupSection"></div>

    <!-- RAW JSON -->
    <button class="raw-toggle" onclick="toggleRaw()">{ } Raw JSON</button>
    <pre class="raw-json" id="rawJson"></pre>

  </div>

</div>

<script>
const EXAMPLES = {
  1: 'A->B, A->C, B->D',
  2: 'X->Y, Y->Z, Z->X',
  3: 'A->B, A->C, B->D, C->E, E->F, X->Y, Y->Z, Z->X, P->Q, Q->R, G->H, G->H, G->I, hello, 1->2, A->',
  4: 'A->B, A->C, B->D, C->D, D->E',
};

function loadExample(n) {
  document.getElementById('inputData').value = EXAMPLES[n];
}

function parseInput(raw) {
  return raw
    .split(/[\n,]+/)
    .map(s => s.trim())
    .filter(s => s.length > 0);
}

async function submitData() {
  const raw = document.getElementById('inputData').value;
  const apiBase = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
  const data = parseInput(raw);

  const btn = document.getElementById('submitBtn');
  const loader = document.getElementById('loader');
  const errBox = document.getElementById('errorBox');
  const resultsEl = document.getElementById('results');

  btn.disabled = true;
  loader.classList.add('active');
  errBox.classList.remove('active');
  resultsEl.classList.remove('active');

  try {
    const res = await fetch(`${apiBase}/bfhl`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
    const json = await res.json();
    renderResults(json);
  } catch (err) {
    errBox.textContent = '⚠ ' + err.message;
    errBox.classList.add('active');
  } finally {
    btn.disabled = false;
    loader.classList.remove('active');
  }
}

function renderResults(d) {
  // Meta
  document.getElementById('metaRow').innerHTML = `
    <div class="pill">user_id: <span>${d.user_id}</span></div>
    <div class="pill">email: <span>${d.email_id}</span></div>
    <div class="pill">roll: <span>${d.college_roll_number}</span></div>
  `;

  // Summary
  const s = d.summary;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="sum-card"><div class="val">${s.total_trees}</div><div class="lbl">Valid Trees</div></div>
    <div class="sum-card"><div class="val">${s.total_cycles}</div><div class="lbl">Cycles</div></div>
    <div class="sum-card"><div class="val">${s.largest_tree_root || '—'}</div><div class="lbl">Largest Root</div></div>
  `;

  // Hierarchies
  const hierEl = document.getElementById('hierGrid');
  hierEl.innerHTML = '';
  (d.hierarchies || []).forEach((h, i) => {
    const isCycle = !!h.has_cycle;
    const card = document.createElement('div');
    card.className = 'hier-card' + (isCycle ? ' cycle' : '');

    const treeText = isCycle ? '' : renderTree(h.root, h.tree);

    card.innerHTML = `
      <div class="hier-head" onclick="toggleCard(this.parentElement)">
        <div class="root-badge">${h.root}</div>
        <div class="hier-head-info">
          <div class="hier-title">Tree rooted at ${h.root}</div>
          <div class="hier-sub">${isCycle ? 'Cyclic group' : `Depth: ${h.depth} node${h.depth !== 1 ? 's' : ''}`}</div>
        </div>
        ${isCycle ? '<div class="cycle-tag">⟳ Cycle</div>' : ''}
        <div class="expand-icon">▶</div>
      </div>
      <div class="hier-body">
        ${isCycle
          ? '<div class="tree-view" style="color:var(--accent2)">⟳ This group contains a cycle — no tree structure available.</div>'
          : `<div class="tree-view">${treeText}</div>`}
      </div>
    `;
    hierEl.appendChild(card);
    // open first one by default
    if (i === 0) { card.classList.add('open'); }
  });

  // Invalid
  const invSec = document.getElementById('invalidSection');
  if (d.invalid_entries && d.invalid_entries.length > 0) {
    invSec.innerHTML = `
      <div class="sec-header">Invalid Entries (${d.invalid_entries.length})</div>
      <div class="tag-list">${d.invalid_entries.map(e => `<span class="entry-tag invalid">${escHtml(e)}</span>`).join('')}</div>
    `;
  } else {
    invSec.innerHTML = `<div class="sec-header">Invalid Entries</div><p style="color:var(--muted);font-size:13px;margin-bottom:20px;">None</p>`;
  }

  // Duplicates
  const dupSec = document.getElementById('dupSection');
  if (d.duplicate_edges && d.duplicate_edges.length > 0) {
    dupSec.innerHTML = `
      <div class="sec-header">Duplicate Edges (${d.duplicate_edges.length})</div>
      <div class="tag-list">${d.duplicate_edges.map(e => `<span class="entry-tag dup">${escHtml(e)}</span>`).join('')}</div>
    `;
  } else {
    dupSec.innerHTML = `<div class="sec-header">Duplicate Edges</div><p style="color:var(--muted);font-size:13px;margin-bottom:20px;">None</p>`;
  }

  // Raw JSON
  document.getElementById('rawJson').textContent = JSON.stringify(d, null, 2);
  document.getElementById('rawJson').classList.remove('active');

  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderTree(rootNode, treeObj) {
  // treeObj is { "A": { "B": {...}, ... } }
  const children = treeObj[rootNode] || {};
  let lines = [];
  lines.push(`<span class="tree-node-root">${rootNode}</span>`);
  renderChildren(children, '', lines);
  return lines.join('\n');
}

function renderChildren(obj, prefix, lines) {
  const keys = Object.keys(obj);
  keys.forEach((key, idx) => {
    const last = idx === keys.length - 1;
    const connector = last ? '└── ' : '├── ';
    const childPrefix = last ? '    ' : '│   ';
    lines.push(`<span class="tree-connector">${prefix}${connector}</span><span class="tree-node">${key}</span>`);
    renderChildren(obj[key], prefix + childPrefix, lines);
  });
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function toggleRaw() {
  document.getElementById('rawJson').classList.toggle('active');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
